name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        type: choice
        default: patch
        options: [patch, minor, major]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version and build number
        id: v
        run: |
          echo "build=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"
          latest=$(git tag -l 'v*' --sort=-v:refname | head -1)
          latest=${latest:-v0.1.0}
          IFS=. read -r major minor patch <<< "${latest#v}"
          case "${{ inputs.bump }}" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            *)     patch=$((patch+1)) ;;
          esac
          echo "version=$major.$minor.$patch" >> "$GITHUB_OUTPUT"

      - name: Stamp version and build number
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.v.outputs.version }}" Support/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.v.outputs.build }}" Support/Info.plist

      - name: Tests
        run: swift test

      - name: Build app
        run: make app

      - name: Package
        run: ditto -c -k --keepParent dist/Rocky.app "dist/Rocky-${{ steps.v.outputs.version }}.zip"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > notes.md <<'EOF'
          ## Install

          Download the zip, unzip and move `Rocky.app` to Applications.

          This build is not notarized yet. On first launch, macOS will warn
          about an unverified developer: go to System Settings → Privacy &
          Security → **Open Anyway**, or run
          `xattr -d com.apple.quarantine /Applications/Rocky.app`.

          You can always build from source instead: `git clone` + `make run`.
          EOF
          echo "" >> notes.md
          echo "Build ${{ steps.v.outputs.build }}." >> notes.md
          gh release create "v${{ steps.v.outputs.version }}" \
            "dist/Rocky-${{ steps.v.outputs.version }}.zip" \
            --title "Rocky ${{ steps.v.outputs.version }}" \
            --notes-file notes.md \
            --generate-notes
